name: Register Character

on:
  issues:
    types: [opened]

jobs:
  register:
    # Only run for issues that look like registration requests
    if: startsWith(github.event.issue.title, 'Register:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cryptography

      - name: Process registration
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          WEBHOOK_ENCRYPTION_KEY: ${{ secrets.WEBHOOK_ENCRYPTION_KEY }}
        run: python scripts/register.py

      - name: Post comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('registration_result.json', 'utf8'));

            if (result.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: result.comment,
              });
            }

            if (result.close_issue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
              });
            }

      - name: Commit registration
        run: |
          git config user.name  "TurtleDink Bot"
          git config user.email "turtledink-bot@users.noreply.github.com"
          git add characters.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git pull --rebase origin ${{ github.ref_name }}
            git commit -m "feat: register character via issue #${{ github.event.issue.number }} [skip ci]"
            git push
          fi

      - name: Clean up result file
        if: always()
        run: rm -f registration_result.json
