name: Poll Character Skills

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run poller
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_THREAD_ID: "1478101192637677568"
        run: python scripts/poll.py --mode skills

      - name: Commit updated character skills
        run: |
          git config user.name  "TurtleDink Bot"
          git config user.email "turtledink-bot@users.noreply.github.com"
          git add characters.json
          if git diff --staged --quiet; then
            echo "No skill changes — nothing to commit."
          else
            git commit -m "chore: update character levels [skip ci]"
            git pull --rebase origin main
            git push
          fi
